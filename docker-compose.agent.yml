services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      SERVER_ADDR: "${SERVER_ADDR}"
      MONITOR_TOKEN: "${MONITOR_TOKEN}"
      PROXMOX_NODE_NAME: "${PROXMOX_NODE_NAME}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    network_mode: "host"
    restart: unless-stopped
