# A2 Configuration
# Generated by: a2 add
#
# Run checks with: a2 check

# Using all default settings
# Uncomment and modify as needed:
#
language:
  explicit: [go, typescript]  # Override auto-detection
  go:
    source_dir: [api, agent]
  typescript:
    source_dir: [ui]

#
files:
  required:
    - README.md
    - LICENSE
#
coverage:
  threshold: 50
#

checks:
  disabled:
    - common:dockerfile
    - security:obfuscation
    - security:network
    - devops:helm
    - devops:pulumi
    - devops:terraform
    - devops:ansible
    - common:e2e
    - common:metrics
    - common:tracing
    - common:errors
    - common:config_validation
    - common:integration
    - common:license