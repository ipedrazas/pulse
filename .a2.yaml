# A2 Configuration
# Generated by: a2 add
#
# Run checks with: a2 check -v

language:
  explicit: [go, typescript, rust] # Override auto-detection
  go:
    source_dir:
      - path: api
        profile: api
      - path: cli
        profile: cli
    coverage_threshold: 50

  typescript:
    source_dir: [ui]
    coverage_threshold: 50

  rust:
    source_dir: [agent]
    coverage_threshold: 50
#
files:
  required:
    - README.md
    - LICENSE

checks:
  disabled:
    - common:dockerfile
    - security:obfuscation
    - security:network
    - security:shell_injection
    - devops:helm
    - devops:pulumi
    - devops:terraform
    - devops:ansible
    - common:e2e
    - common:metrics
    - common:tracing
    - common:errors
    - common:config_validation
    - common:integration
    - common:license
    - typescript:logging
    - common:retry
    - common:api_docs
    
