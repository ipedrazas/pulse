version: "3"

vars:
  API_BIN: api/bin/pulse-api
  CLI_BIN: cli/bin/pulse
  REGISTRY: git.andcake.dev/ivan
  IMAGE_API: pulse-api
  IMAGE_AGENT: pulse-agent
  IMAGE_UI: pulse-ui
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u '+%Y-%m-%dT%H:%M:%SZ'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # --- Proto ---
  proto:
    desc: Generate protobuf code
    cmds:
      - buf generate
    sources:
      - proto/**/*.proto

  proto:lint:
    desc: Lint protobuf definitions
    cmds:
      - buf lint

  # --- API (Go) ---
  api:build:
    desc: Build the API server
    dir: api
    cmds:
      - >-
        go build
        -ldflags="-X github.com/ipedrazas/pulse/api/internal/version.Version={{.VERSION}}
        -X github.com/ipedrazas/pulse/api/internal/version.Commit={{.COMMIT}}
        -X github.com/ipedrazas/pulse/api/internal/version.BuildDate={{.BUILD_DATE}}"
        -o bin/pulse-api ./cmd/api
    sources:
      - "**/*.go"

  api:test:
    desc: Run API tests
    dir: api
    cmds:
      - go test ./... -v -count=1

  api:lint:
    desc: Lint API code
    dir: api
    cmds:
      - golangci-lint run ./...

  api:run:
    desc: Run the API server locally
    dir: api
    cmds:
      - go run ./cmd/api

  api:fmt:
    desc: FMT API code
    dir: api
    cmds:
      - gofmt -w .

  # --- CLI (Go) ---
  cli:build:
    desc: Build the CLI
    dir: cli
    cmds:
      - >-
        go build
        -ldflags="-X github.com/ipedrazas/pulse/cli/internal/version.Version={{.VERSION}}
        -X github.com/ipedrazas/pulse/cli/internal/version.Commit={{.COMMIT}}
        -X github.com/ipedrazas/pulse/cli/internal/version.BuildDate={{.BUILD_DATE}}"
        -o bin/pulse ./cmd/pulse
    sources:
      - "**/*.go"

  cli:test:
    desc: Run CLI tests
    dir: cli
    cmds:
      - go test ./... -v -count=1

  cli:lint:
    desc: Lint CLI code
    dir: cli
    cmds:
      - golangci-lint run ./...

  cli:fmt:
    desc: FMT cli code
    dir: cli
    cmds:
      - gofmt -w .
  
  cli:install:
    desc: install the CLI
    dir: cli
    cmds:
      - >-
        go install
        -ldflags="-s -w -X github.com/ipedrazas/pulse/cli/internal/version.Version={{.VERSION}}
        -X github.com/ipedrazas/pulse/cli/internal/version.Commit={{.COMMIT}}
        -X github.com/ipedrazas/pulse/cli/internal/version.BuildDate={{.BUILD_DATE}}" ./cmd/pulse

  # --- Agent (Rust) ---
  agent:build:
    desc: Build the Rust agent
    dir: agent
    cmds:
      - cargo build

  agent:test:
    desc: Run agent tests
    dir: agent
    cmds:
      - cargo test

  agent:lint:
    desc: Lint agent code
    dir: agent
    cmds:
      - cargo clippy -- -D warnings

  agent:fmt:
    desc: Format agent code
    dir: agent
    cmds:
      - cargo fmt

  agent:run:
    desc: Run the agent locally
    dir: agent
    cmds:
      - cargo run

  agent:release:darwin-arm64:
    desc: Build agent release binary for macOS (arm64)
    dir: agent
    cmds:
      - cargo build --release --target aarch64-apple-darwin
      - cp target/aarch64-apple-darwin/release/pulse-agent bin/pulse-agent-darwin-arm64

  agent:release:linux-amd64:
    desc: Build agent release binary for Linux (amd64)
    dir: agent
    cmds:
      - cargo build --release --target x86_64-unknown-linux-musl
      - cp target/x86_64-unknown-linux-musl/release/pulse-agent bin/pulse-agent-linux-amd64

  agent:release:
    desc: Build agent release binaries for all platforms
    dir: agent
    cmds:
      - mkdir -p bin
      - task: agent:release:darwin-arm64
      - task: agent:release:linux-amd64

  # --- UI (React) ---
  ui:install:
    desc: Install UI dependencies
    dir: ui
    cmds:
      - npm install

  ui:dev:
    desc: Start UI dev server
    dir: ui
    cmds:
      - npm run dev

  ui:build:
    desc: Build UI for production
    dir: ui
    env:
      PULSE_VERSION: "{{.VERSION}}"
    cmds:
      - npm run build

  ui:lint:
    desc: Lint UI code
    dir: ui
    cmds:
      - npx biome check .

  ui:test:
    desc: Run UI tests
    dir: ui
    cmds:
      - npm test

  ui:fmt:
    desc: Format ui code
    dirs: ui
    cmds:
      - npx prettier --write .

  # --- Docker Images ---
  docker:api:
    desc: Build API Docker image
    cmds:
      - >-
        docker build --platform linux/arm64,linux/amd64
        --build-arg VERSION={{.VERSION}}
        --build-arg COMMIT={{.COMMIT}}
        --build-arg BUILD_DATE={{.BUILD_DATE}}
        -f api/Dockerfile -t {{.REGISTRY}}/{{.IMAGE_API}}:latest . --push

  docker:agent:
    desc: Build Agent Docker image
    cmds:
      - docker build --platform linux/arm64,linux/amd64 -f agent/Dockerfile -t {{.REGISTRY}}/{{.IMAGE_AGENT}}:latest .

  docker:ui:
    desc: Build UI Docker image
    cmds:
      - >-
        docker build --platform linux/arm64,linux/amd64
        --build-arg VERSION={{.VERSION}}
        -f ui/Dockerfile -t {{.REGISTRY}}/{{.IMAGE_UI}}:latest . --push

  docker:build:
    desc: Build all Docker images
    cmds:
      - task: docker:api
      - task: docker:agent
      - task: docker:ui

  docker:push:
    desc: Push all Docker images
    cmds:
      - docker push {{.REGISTRY}}/{{.IMAGE_API}}:latest
      - docker push {{.REGISTRY}}/{{.IMAGE_AGENT}}:latest
      - docker push {{.REGISTRY}}/{{.IMAGE_UI}}:latest

  # --- Compose ---
  up:
    desc: Start local dev stack (DB + API)
    cmds:
      - docker compose up -d --build

  down:
    desc: Stop local dev stack
    cmds:
      - docker compose down

  db:
    desc: Start only the database
    cmds:
      - docker compose up -d db

  # --- All ---
  build:
    desc: Build all components
    cmds:
      - task: api:build
      - task: cli:build
      - task: agent:build
      - task: ui:build

  test:
    desc: Run all tests
    cmds:
      - task: api:test
      - task: cli:test
      - task: agent:test

  lint:
    desc: Lint all code
    cmds:
      - task: api:lint
      - task: cli:lint
      - task: agent:lint
      - task: ui:lint

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -f {{.API_BIN}} {{.CLI_BIN}}
      - cd agent && cargo clean
      - cd ui && rm -rf dist

  fmt:
    desc: Format code
    cmds:
      - task api:fmt
      - task cli:fmt
      - task agent:fmt
      - task ui:fmt
