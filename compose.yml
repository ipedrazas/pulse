services:
  api:
    image: ipedrazas/pulse-api:latest
    container_name: pulse-api
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      DB_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}?sslmode=disable"
      GRPC_PORT: "50051"
      HTTP_PORT: "8080"
      MONITOR_TOKEN: "${MONITOR_TOKEN}"
    depends_on:
      timescaledb:
        condition: service_healthy
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - tsdb_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ui:
    image: ipedrazas/pulse-ui:latest
    container_name: pulse-ui
    build:
      context: ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

  agent:
    image: ipedrazas/pulse-agent:latest
    container_name: pulse-agent
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      SERVER_ADDR: "${SERVER_ADDR}"
      MONITOR_TOKEN: "${MONITOR_TOKEN}"
      PROXMOX_NODE_NAME: "${PROXMOX_NODE_NAME}"
      POLL_DELAY_SECONDS: "${POLL_DELAY_SECONDS:-0}"
      METADATA_RESYNC_SECONDS: "${METADATA_RESYNC_SECONDS:-3600}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    # network_mode: "host"
    restart: unless-stopped
    depends_on:
      - api


volumes:
  tsdb_data:
