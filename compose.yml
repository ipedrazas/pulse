services:
  db:
    image: timescale/timescaledb:latest-pg17
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      PULSE_DB_URL: postgres://pulse:pulse@db:5432/pulse?sslmode=disable
      PULSE_GRPC_ADDR: :9090
      PULSE_REST_ADDR: :8080
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      db:
        condition: service_healthy

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    environment:
      PULSE_API_ADDR: http://api:9090
      PULSE_NODE_NAME: agent-1
      PULSE_POLL_INTERVAL: 30s
      PULSE_REDACT_PATTERNS: PASSWORD,SECRET,KEY,TOKEN,CREDENTIAL
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - api

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
