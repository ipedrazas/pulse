name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  REGISTRY: git.andcake.dev/ivan

jobs:
  # ---------------------------------------------------------------------------
  # Docker images (API, Agent, UI) — linux/amd64 + linux/arm64
