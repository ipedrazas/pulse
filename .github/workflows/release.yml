  #           ${{ env.REGISTRY }}/${{ matrix.image }}:${{ steps.version.outputs.version }}
  #           ${{ env.REGISTRY }}/${{ matrix.image }}:latest

  # ---------------------------------------------------------------------------
  # CLI binaries (Go) — linux/amd64, linux/arm64, darwin/arm64
  # ---------------------------------------------------------------------------
  cli:
    name: CLI (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install buf & generate protos
        run: |
          curl -sSL https://github.com/bufbuild/buf/releases/latest/download/buf-Linux-x86_64 -o /usr/local/bin/buf
          chmod +x /usr/local/bin/buf
          buf generate

      - name: Init Go workspace
        run: go work init ./api ./cli ./proto

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" -o pulse-${{ matrix.goos }}-${{ matrix.goarch }} github.com/ipedrazas/pulse/cli/cmd/pulse

      - uses: actions/upload-artifact@v4
        with:
          name: pulse-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: pulse-${{ matrix.goos }}-${{ matrix.goarch }}

  # ---------------------------------------------------------------------------
  # Agent binaries (Rust) — linux/amd64, linux/arm64, darwin/arm64
  # ---------------------------------------------------------------------------
  agent-binary:
    name: Agent (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: agent
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: pulse-agent-linux-amd64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            artifact: pulse-agent-linux-arm64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: pulse-agent-darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install protoc
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/pulse-agent ../${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ---------------------------------------------------------------------------
  # GitHub Release — collect all binaries and publish
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [cli, agent-binary]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: pulse-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Release ${{ inputs.version }}
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          files: artifacts/*
