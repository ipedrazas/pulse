name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go (API + CLI)
    runs-on: ubuntu-latest
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_USER: pulse
          POSTGRES_PASSWORD: pulse
          POSTGRES_DB: pulse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pulse"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint protos
        run: buf lint

      - name: Generate protos
        run: buf generate

      - name: Init Go workspace
        run: go work init ./api ./cli ./proto

      - name: Build API
        run: go build github.com/ipedrazas/pulse/api/...

      - name: Build CLI
        run: go build github.com/ipedrazas/pulse/cli/...

      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -C api ./...
          govulncheck -C cli ./...

      - name: Test API (unit)
        run: go test github.com/ipedrazas/pulse/api/... -v -count=1 -short

      - name: Test API (integration)
        run: go test github.com/ipedrazas/pulse/api/internal/integration/ -v -count=1 -timeout 120s

      - name: Test CLI
        run: go test github.com/ipedrazas/pulse/cli/... -v -count=1

  rust:
    name: Rust (Agent)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Cargo audit
        run: |
          cargo install cargo-audit
          cargo audit

      - name: Test
        run: cargo test

      - name: Build
        run: cargo build --release

  ui:
    name: UI (React)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: npm audit
        run: npm audit --omit=dev

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
